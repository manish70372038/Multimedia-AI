server {
    listen 80;

    # Frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Sabhi API requests (upload, chat, summary, timestamps)
    # Kyunki aapke backend routes /api se start ho rahe hain
    location /api/ {
        # 'multimedia_backend' confirm karein aapke docker-compose.yml mein service name hai
        proxy_pass http://multimedia_backend:8000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Badi files (Video/Audio/PDF) ke liye settings
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Agar koi specific route bina /api ke call ho raha hai (optional)
    location /summary/ {
        proxy_pass http://multimedia_backend:8000/summary/;
        proxy_set_header Host $host;
    }

    location /timestamps/ {
        proxy_pass http://multimedia_backend:8000/timestamps/;
        proxy_set_header Host $host;
    }
}