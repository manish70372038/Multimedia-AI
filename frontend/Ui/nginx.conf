server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /chat/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /summary/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /timestamps/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}